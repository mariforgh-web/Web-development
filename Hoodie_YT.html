<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clothing Sell - JackwFandL_YT</title>
<style>
/* Animated YouTube-style gradient background */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(-45deg, #ff0000, #ff4d4d, #d90000, #ff1a1a);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white;
    position: relative;
    overflow-x: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* F&L background watermark - bright white */
body::before {
    content: "F&L";
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 200px;
    font-weight: bold;
    color: white; /* bright white */
    z-index: 0;
    pointer-events: none;
    user-select: none;
}

/* Page content on top */
#mainContent, .cart, #fullSubscribe {
    position: relative;
    z-index: 1;
}

/* Page styling */
h1 { margin-top: 40px; }
h6 { margin: 5px 0; color: white; }

table {
    width: 80%;
    margin: 30px auto;
    border-collapse: collapse;
    background-color: rgba(255,255,255,0.95);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    color: #000;
}
th, td { padding: 12px; }
th { background-color: #ff0000; color: white; }
tr:hover { background-color: #f5f5f5; }

select {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background-color: #ff0000;
    color: white;
    cursor: pointer;
    margin-left: 5px;
    transition: 0.3s;
}
button:hover { background-color: #d90000; }

#result { margin-top: 15px; font-weight: bold; font-size: 18px; }
.success { color: #00ff00; }
.error { color: #ffff00; }

.cart {
    background: rgba(255,255,255,0.95);
    width: 80%;
    margin: 20px auto;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    text-align: left;
    color: #000;
}
.remove { background: red; margin-left: 10px; }

#fullSubscribe {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    color:white;
    font-size:100px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    display:none;
}
</style>
</head>
<body>

<div id="mainContent">
<h1>👕 Clothing Sell - JackwFandL_YT</h1>
<h6>code67</h6>
<h6>a secret code</h6>

<table>
<thead>
<tr>
<th>Product</th>
<th>Size</th>
<th>Price</th>
<th>Buy</th>
</tr>
</thead>
<tbody>
<tr>
<td>Red & Orange Hoodie</td>
<td>
  <select id="size1">
    <option>Small</option>
    <option>Medium</option>
    <option>Large</option>
  </select>
</td>
<td>$25</td>
<td><button onclick="addToCart('Red & Orange Hoodie',25,'size1')">Add</button></td>
</tr>

<tr>
<td>White T-Shirt</td>
<td>
  <select id="size2">
    <option>Small</option>
    <option>Medium</option>
    <option>Large</option>
  </select>
</td>
<td>$25</td>
<td><button onclick="addToCart('White T-Shirt',25,'size2')">Add</button></td>
</tr>

<tr>
<td>Black Hoodie</td>
<td>
  <select id="size3">
    <option>Small</option>
    <option>Medium</option>
    <option>Large</option>
  </select>
</td>
<td>$25</td>
<td><button onclick="addToCart('Black Hoodie',25,'size3')">Add</button></td>
</tr>
</tbody>
</table>

<!-- CART -->
<div class="cart">
<h2>Your Cart 🛒</h2>
<ul id="cartList"></ul>
<h3 id="total">Total: $0</h3>
</div>

<hr>
<h3>Enter Code</h3>
<input type="text" id="codeInput" placeholder="Enter code">
<button onclick="checkCode()">Submit</button>
<p id="result"></p>
</div>

<div id="fullSubscribe">SUBSCRIBE!</div>

<script>
// Codes & rewards
const validCodes = ["jackwfandl_yt", "shadow67", "final200", "mari137", "secret1"];
const rewards = [
    "🎉 You got a Red & Orange Small hoodie!",
    "🔥 Lucky! You got a White Medium T-Shirt!",
    "😎 You got a Black Large hoodie!",
    "✨ Bonus win! Another Red & Orange Small hoodie!",
    "💯 Clean pickup! White Medium T-Shirt!",
    "🚀 Big win! Black Large hoodie!"
];

// Cart
let cart = [];
let total = 0;

function addToCart(name, price, sizeId){
    const size = document.getElementById(sizeId).value;
    cart.push({name, price, size});
    total += price;
    updateCart();
}

function removeItem(i){
    total -= cart[i].price;
    cart.splice(i,1);
    updateCart();
}

function updateCart(){
    const list = document.getElementById("cartList");
    list.innerHTML = "";
    cart.forEach((item,i)=>{
        const li = document.createElement("li");
        li.innerHTML = `${item.name} (${item.size}) - $${item.price} 
        <button class="remove" onclick="removeItem(${i})">X</button>`;
        list.appendChild(li);
    });
    document.getElementById("total").textContent = "Total: $" + total;
}

// Code system
function checkCode() {
    const input = document.getElementById("codeInput");
    const result = document.getElementById("result");
    const code = input.value.trim().toLowerCase();

    if(!code){
        result.textContent = "Please enter a code";
        result.className = "error";
        return;
    }

    if(code === "code67"){
        document.getElementById("mainContent").style.display = "none";
        const fullScreen = document.getElementById("fullSubscribe");
        fullScreen.style.display = "flex";

        setTimeout(()=>{
            window.open("https://www.youtube.com/@JackwFandL-m1", "_blank");
            fullScreen.style.display = "none";
            document.getElementById("mainContent").style.display = "block";
        },2000);
        return;
    }

    if(validCodes.includes(code)){
        const randomReward = rewards[Math.floor(Math.random() * rewards.length)];
        result.textContent = randomReward;
        result.className = "success";
        input.value = "";
    } else {
        result.textContent = "❌ Wrong code, try again";
        result.className = "error";
    }
}

// Enter key
document.getElementById("codeInput").addEventListener("keydown", function(e){
    if(e.key === "Enter") checkCode();
});
</script>
</body>
</html>
