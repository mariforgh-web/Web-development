<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoodie Giveaway</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            color: #333;
        }

        table {
            width: 80%;
            margin: 30px auto;
            border-collapse: collapse;
            background-color: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        th {
            background-color: #00bcd4;
            color: white;
            padding: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f5f5f5;
            transition: 0.3s;
        }

        tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <h1>🎁 Hoodie Give away Sizes</h1>

    <table>
        <thead>
            <tr>
                <th>Color</th>
                <th>Size</th>
                <th>Season</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Red & Orange</td>
                <td>Small</td>
                <td>Spring & Summer</td>
            </tr>
            <tr>
                <td>White</td>
                <td>Medium</td>
                <td>Fall & Winter</td>
            </tr>
            <tr>
                <td>Black</td>
                <td>Large</td>
                <td>All Seasons</td>
            </tr>
        </tbody>
    </table>
<hr>

<h3>Enter Code</h3>

<input type="text" id="codeInput" placeholder="Enter code">
<button onclick="checkCode()">Submit Code</button>

<p id="result"></p>

<script>
function checkCode() {
    let userCode = document.getElementById("codeInput").value.trim();

    // 👉 YOU will change these later
    let codes = ["JackwFandL_YT", "Shadow67", "Final200", "Mari137"];

    if (codes.includes(userCode)) {
        document.getElementById("result").innerHTML = "Code accepted";
    } else {
        document.getElementById("result").innerHTML = "Wrong code";
    }
}
</script>
</body>
</html>
