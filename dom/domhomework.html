<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>JavaScript Datatypes, let keyword and Loops</h1>
    <p id="result"></p>

    <script>
        var i; // i is undefined
        var text = "";

        {
            let i = 0; // block-scoped variable

            while (i < 10) {
                text += "The values inside the block: " + i + "<br>";
                i++;
            }

            document.getElementById("result").innerHTML = text;
        }
    </script>

</body>
</html>
