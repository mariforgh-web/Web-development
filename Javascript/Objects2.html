<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <h2>JavaScript Arrays</h2>

     <p id="demo"></p>
     <p id="Robin"></p>
     <p id="Transfer"></p>
     <p id="Python"></p>
     <p id="Trap"></p>
     <p id="Barn"></p>
     <script>
    var cars = [
        "Coding",
         "Magic",
        "Learn",
        ];
    cars.push("Html");
    cars.push("Drip");
    var everything = "";
    document.getElementById("demo").innerHTML = cars[2];
    document.getElementById("Robin").innerHTML = cars[1];
    document.getElementById("Transfer").innerHTML = cars[0];
    document.getElementById("Python").innerHTML = cars[3];
    document.getElementById("Trap").innerHTML = cars [4];
    for (var i = 0; i < cars.length; i++) {
        console.log(cars[i]);
        everything = everything + cars[i];
    }
    document.getElementById("Barn").innerHTML = everything ;
     </script>
</body>
</html>
