<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>World Clock Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins', sans-serif;

    background:
    linear-gradient(135deg,
    #0f2027,
    #203a43,
    #2c5364);

    min-height:100vh;

    overflow-y:auto;

    color:white;

    padding:40px;
}

/* TITLE */

.title{
    text-align:center;
    margin-bottom:50px;
}

.title h1{
    font-size:60px;
    margin-bottom:10px;

    background:linear-gradient(
    90deg,
    #00ffff,
    #ffffff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.title p{
    opacity:0.8;
    font-size:18px;
}

/* GRID */

.container{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(330px,1fr));

    gap:40px;
}

/* CARD */

.clock-card{

    border-radius:30px;

    padding:30px;

    position:relative;

    overflow:hidden;

    transition:0.5s;

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);
}

.clock-card:hover{
    transform:
    translateY(-10px)
    scale(1.02);
}

/* DAY MODE */

.day{

    background:
    linear-gradient(135deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.08));

    box-shadow:
    0 10px 30px rgba(255,255,255,0.1),
    0 0 30px rgba(0,255,255,0.15);
}

/* NIGHT MODE */

.night{

    background:
    linear-gradient(135deg,
    rgba(0,0,0,0.45),
    rgba(0,0,0,0.25));

    box-shadow:
    0 10px 30px rgba(0,0,0,0.5),
    0 0 40px rgba(0,0,0,0.5);
}

/* CITY */

.city{
    text-align:center;
    margin-bottom:20px;
}

.city h2{
    font-size:34px;
}

.city p{
    color:#00ffff;
    letter-spacing:2px;
    margin-top:5px;
}

/* CLOCK */

.clock{

    width:250px;
    height:250px;

    border-radius:50%;

    margin:20px auto;

    position:relative;

    background:
    radial-gradient(circle,
    #222 0%,
    #111 70%);

    border:10px solid rgba(255,255,255,0.1);

    box-shadow:
    inset 0 0 20px rgba(255,255,255,0.1),
    0 0 25px rgba(0,0,0,0.4);
}

/* NUMBERS */

.number{

    position:absolute;

    width:100%;
    height:100%;

    text-align:center;

    font-size:24px;

    font-weight:bold;
}

.number span{
    display:inline-block;
    transform:translateY(10px);
}

.n1{ transform:rotate(30deg);}
.n1 span{ transform:rotate(-30deg);}

.n2{ transform:rotate(60deg);}
.n2 span{ transform:rotate(-60deg);}

.n3{ transform:rotate(90deg);}
.n3 span{ transform:rotate(-90deg);}

.n4{ transform:rotate(120deg);}
.n4 span{ transform:rotate(-120deg);}

.n5{ transform:rotate(150deg);}
.n5 span{ transform:rotate(-150deg);}

.n6{ transform:rotate(180deg);}
.n6 span{ transform:rotate(-180deg);}

.n7{ transform:rotate(210deg);}
.n7 span{ transform:rotate(-210deg);}

.n8{ transform:rotate(240deg);}
.n8 span{ transform:rotate(-240deg);}

.n9{ transform:rotate(270deg);}
.n9 span{ transform:rotate(-270deg);}

.n10{ transform:rotate(300deg);}
.n10 span{ transform:rotate(-300deg);}

.n11{ transform:rotate(330deg);}
.n11 span{ transform:rotate(-330deg);}

/* HANDS */

.hand{

    position:absolute;

    bottom:50%;
    left:50%;

    transform-origin:bottom;

    transform:
    translateX(-50%)
    rotate(0deg);

    border-radius:20px;
}

.hour{
    width:8px;
    height:65px;
    background:white;
    z-index:5;
}

.minute{
    width:5px;
    height:90px;
    background:#00ffff;
    z-index:10;
}

.second{
    width:2px;
    height:105px;
    background:red;
    z-index:15;

    box-shadow:0 0 12px red;
}

/* CENTER */

.center-dot{

    width:16px;
    height:16px;

    background:#00ffff;

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    border-radius:50%;

    z-index:20;

    box-shadow:0 0 15px #00ffff;
}

/* DIGITAL */

.digital{

    text-align:center;

    font-size:30px;

    font-weight:bold;

    margin-top:20px;

    letter-spacing:3px;
}

/* DATE */

.date{

    text-align:center;

    margin-top:12px;

    opacity:0.85;
}

/* STATUS */

.status{

    text-align:center;

    margin-top:15px;

    font-size:18px;

    font-weight:bold;
}

.am{
    color:#ffe066;
}

.pm{
    color:#8ec5ff;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:12px;
}

::-webkit-scrollbar-track{
    background:#111;
}

::-webkit-scrollbar-thumb{
    background:#00ffff;
    border-radius:20px;
}

</style>
</head>

<body>

<div class="title">

    <h1>WORLD CLOCKS</h1>

    <p>Live Analog & Digital Time Around The World</p>

</div>

<div class="container" id="container"></div>

<script>

/* WORLD TIME ZONES */

const clocks = [

{
    city:"Toronto",
    zone:"America/Toronto",
    label:"EDT"
},

{
    city:"New York",
    zone:"America/New_York",
    label:"EDT"
},

{
    city:"London",
    zone:"Europe/London",
    label:"GMT"
},

{
    city:"Paris",
    zone:"Europe/Paris",
    label:"CET"
},

{
    city:"Dubai",
    zone:"Asia/Dubai",
    label:"GST"
},

{
    city:"New Delhi",
    zone:"Asia/Kolkata",
    label:"IST"
},

{
    city:"Tokyo",
    zone:"Asia/Tokyo",
    label:"JST"
},

{
    city:"Beijing",
    zone:"Asia/Shanghai",
    label:"CST"
},

{
    city:"Sydney",
    zone:"Australia/Sydney",
    label:"AEST"
},

{
    city:"Los Angeles",
    zone:"America/Los_Angeles",
    label:"PDT"
},

{
    city:"Mexico City",
    zone:"America/Mexico_City",
    label:"CST"
},

{
    city:"Moscow",
    zone:"Europe/Moscow",
    label:"MSK"
}

];

/* CREATE CLOCKS */

const container =
document.getElementById("container");

clocks.forEach((clockData,index)=>{

    const card =
    document.createElement("div");

    card.className =
    "clock-card";

    card.innerHTML = `

    <div class="city">
        <h2>${clockData.city}</h2>
        <p>${clockData.label}</p>
    </div>

    <div class="clock" id="clock${index}">

        <div class="number n1"><span>1</span></div>
        <div class="number n2"><span>2</span></div>
        <div class="number n3"><span>3</span></div>
        <div class="number n4"><span>4</span></div>
        <div class="number n5"><span>5</span></div>
        <div class="number n6"><span>6</span></div>
        <div class="number n7"><span>7</span></div>
        <div class="number n8"><span>8</span></div>
        <div class="number n9"><span>9</span></div>
        <div class="number n10"><span>10</span></div>
        <div class="number n11"><span>11</span></div>
        <div class="number n12"><span>12</span></div>

        <div class="hand hour"></div>
        <div class="hand minute"></div>
        <div class="hand second"></div>

        <div class="center-dot"></div>

    </div>

    <div class="digital"></div>

    <div class="date"></div>

    <div class="status"></div>

    `;

    container.appendChild(card);

});

/* UPDATE CLOCKS */

function updateClocks(){

    clocks.forEach((clockData,index)=>{

        const card =
        document.querySelectorAll(".clock-card")[index];

        const clock =
        document.getElementById(`clock${index}`);

        const now = new Date();

        const localTime =
        new Date(
            now.toLocaleString(
                "en-US",
                {
                    timeZone:
                    clockData.zone
                }
            )
        );

        const hours =
        localTime.getHours();

        const minutes =
        localTime.getMinutes();

        const seconds =
        localTime.getSeconds();

        /* HANDS */

        const hourHand =
        clock.querySelector(".hour");

        const minuteHand =
        clock.querySelector(".minute");

        const secondHand =
        clock.querySelector(".second");

        /* DEGREES */

        const hourDeg =
        (hours % 12) * 30 +
        minutes * 0.5;

        const minuteDeg =
        minutes * 6 +
        seconds * 0.1;

        const secondDeg =
        seconds * 6;

        /* ROTATE */

        hourHand.style.transform =
        `translateX(-50%) rotate(${hourDeg}deg)`;

        minuteHand.style.transform =
        `translateX(-50%) rotate(${minuteDeg}deg)`;

        secondHand.style.transform =
        `translateX(-50%) rotate(${secondDeg}deg)`;

        /* DIGITAL */

        const digital =
        card.querySelector(".digital");

        digital.innerHTML =
        localTime.toLocaleTimeString();

        /* DATE */

        const date =
        card.querySelector(".date");

        date.innerHTML =
        localTime.toDateString();

        /* AM PM */

        const status =
        card.querySelector(".status");

        const isAM =
        hours < 12;

        status.innerHTML =
        isAM
        ? "☀️ DAY TIME"
        : "🌙 NIGHT TIME";

        status.className =
        `status ${isAM ? "am" : "pm"}`;

        /* DAY NIGHT STYLE */

        if(isAM){

            card.classList.add("day");
            card.classList.remove("night");

        }else{

            card.classList.add("night");
            card.classList.remove("day");
        }

    });

}

/* START */

updateClocks();

setInterval(updateClocks,1000);

</script>

</body>
</html>
