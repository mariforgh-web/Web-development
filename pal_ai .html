<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palindrome Checker</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2b2b45);
        color: white;
        text-align: center;
        padding-top: 80px;
    }

    h1 {
        font-size: 40px;
        margin-bottom:20px;
    }

    input {
        padding: 12px;
        width: 250px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
    }

    button {
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 8px;
        background: #ff4d6d;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff1e4d;
    }

    #result {
        margin-top: 30px;
        font-size: 22px;
        font-weight: bold;
    }

    .box {
        background: rgba(255,255,255,0.1);
        padding: 30px;
        display: inline-block;
        border-radius: 16px;
        backdrop-filter: blur(10px);
    }
</style>
</head>

<body>

<div class="box">
    <h1>🔁 Palindrome Checker</h1>

    <input type="text" id="textinput" placeholder="Enter a word...">
    <button onclick="checkPalindrome()">Check</button>

    <div id="result"></div>
</div>

<script>
function checkPalindrome() {
    let input = document.getElementById("textinput").value;

    let cleaned = input.replace(/[^A-Za-z0-9]/g, "").toLowerCase();
    let reversed = cleaned.split("").reverse().join("");

    let result = document.getElementById("result");

    if (!input) {
        result.innerHTML = "⚠️ Please enter something!";
        return;
    }

    if (cleaned === reversed) {
        result.innerHTML = `🎉 <b>${input}</b> is a palindrome!`;
    } else {
        result.innerHTML = `❌ <b>${input}</b> is NOT a palindrome.`;
    }
}
</script>

</body>
</html>
