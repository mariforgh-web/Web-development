<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codingal Loader</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: Arial, sans-serif;
    color: white;
    flex-direction: column;
}

/* Loader Section */
.loader-section, .landing-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

/* Progress bars */
.progress {
    height: 30px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    box-shadow: inset 0 3px 6px rgba(0,0,0,0.2);
    overflow: hidden;
    width: 400px;
}

.progress-bar {
    background: linear-gradient(90deg, #00c6ff, #0072ff, #00ffcc);
    width: 0%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
    border-radius: 20px;
    box-shadow: 0 0 15px rgba(0,255,204,0.6);
    transition: width 0.3s ease-in-out;
    animation: glow 2s infinite;
}

@keyframes glow {
    0% { box-shadow: 0 0 10px rgba(0,255,204,0.5); }
    50% { box-shadow: 0 0 20px rgba(0,255,204,0.8); }
    100% { box-shadow: 0 0 10px rgba(0,255,204,0.5); }
}

/* Landing Section */
.landing-section {
    display: none;
    text-align: center;
}

.landing-section h1 {
    font-size: 50px;
    background: linear-gradient(90deg, #00c6ff, #0072ff, #00ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    margin-bottom: 20px;
    animation: glowText 2s ease-in-out infinite alternate;
}

@keyframes glowText {
    0% { text-shadow: 0 0 10px rgba(0,255,204,0.5); }
    50% { text-shadow: 0 0 25px rgba(0,114,255,0.9); }
    100% { text-shadow: 0 0 10px rgba(0,255,204,0.5); }
}

.btn-start {
    padding: 15px 35px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 30px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    border: none;
    color: white;
    transition: transform 0.3s, box-shadow 0.3s;
}

.btn-start:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<!-- Loader Section -->
<div class="loader-section">
    <h2>Loading Codingal...</h2>
    <div class="progress" id="progress1"><div class="progress-bar">0%</div></div>
    <div class="progress" id="progress2"><div class="progress-bar">0%</div></div>
    <div class="progress" id="progress3"><div class="progress-bar">0%</div></div>
</div>

<!-- Landing Section -->
<div class="landing-section">
    <h1>Codingal</h1>
    <p>Click below to get started on Codingal 🚀</p>
    <a href="https://www.codingal.com" target="_blank" class="btn btn-start">Get Started</a>
</div>

<script>
// Animate progress bars
function animateProgress(barId, target, callback) {
    const bar = document.querySelector(`#${barId} .progress-bar`);
    let width = 0;
    const interval = setInterval(() => {
        if(width >= target) {
            clearInterval(interval);
            if(callback) callback();
        } else {
            width++;
            bar.style.width = width + '%';
            bar.textContent = width + '%';
        }
    }, 30);
}

// Animate all bars
let completedBars = 0;
function barComplete() {
    completedBars++;
    if(completedBars === 3) {
        // All bars done, show landing
        document.querySelector('.loader-section').style.display = 'none';
        document.querySelector('.landing-section').style.display = 'flex';
    }
}

animateProgress('progress1', 100, barComplete);
animateProgress('progress2', 100, barComplete);
animateProgress('progress3', 100, barComplete);
</script>

</body>
</html>
