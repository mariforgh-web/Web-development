<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codingal Profile</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Body & background */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: 'Arial', sans-serif;
}

/* Codingal glowing title */
.brand-title {
    position: absolute;
    top: 40px;
    font-size: 50px;
    font-weight: 800;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #00c6ff, #0072ff, #00ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px rgba(0,255,204,0.5); }
    to { text-shadow: 0 0 25px rgba(0,114,255,0.9); }
}

/* Profile card */
.profile-card {
    width: 340px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    text-align: center;
    padding-bottom: 20px;
}

.profile-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.6);
}

.profile-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* Card body */
.card-body {
    padding: 15px 20px;
}

.card-body h4 {
    margin-top: 15px;
    font-weight: 700;
    color: #fff;
}

.card-body p {
    color: #dcdcdc;
    margin-bottom: 15px;
}

/* Button */
.btn-custom {
    border-radius: 30px;
    padding: 8px 25px;
    font-weight: bold;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    border: none;
    color: white;
    transition: transform 0.3s, box-shadow 0.3s;
}

.btn-custom:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<h1 class="brand-title">Codingal</h1>

<div class="profile-card">
    <img src="https://t3.ftcdn.net/jpg/03/46/83/96/360_F_346839683_6nAPzbhpSkIpb8pmAwufkC7c5eD7wYws.jpg" alt="Profile Image">
    <div class="card-body">
        <h4>User Name</h4>
        <p>Passionate about programming</p>
        <a href="#" class="btn btn-custom">See Profile</a>
    </div>
</div>

</body>
</html>
