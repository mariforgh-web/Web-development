<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoodie Sell - JackwFandL_YT</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    text-align: center;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

h1 { margin-top: 40px; }
h6 { margin: 5px 0; color: #333; }

table {
    width: 80%;
    margin: 30px auto;
    border-collapse: collapse;
    background-color: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

th {
    background-color: #00bcd4;
    color: white;
    padding: 12px;
}

td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

tr:hover { background-color: #f5f5f5; }

input {
    padding: 10px;
    border-radius: 6px;
    border: none;
    width: 200px;
    margin-top: 10px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    background-color: #00bcd4;
    color: white;
    cursor: pointer;
    margin-left: 10px;
    transition: 0.3s;
}

button:hover { background-color: #0097a7; }

#result {
    margin-top: 15px;
    font-weight: bold;
    font-size: 18px;
}

.success { color: green; }
.error { color: red; }

/* Full page SUBSCRIBE screen */
#fullSubscribe {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-color:red;
    color:white;
    font-size:100px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    display:none; /* hidden by default */
}
</style>
</head>
<body>

<div id="mainContent">
<h1>🧥 Hoodie Sell - JackwFandL_YT</h1>
<h6>code67</h6>
<h6>a secret code</h6>

<table>
    <thead>
        <tr>
            <th>Color</th>
            <th>Size</th>
            <th>Season</th>
        </tr>
    </thead>
    <tbody>
        <tr><td>Red & Orange</td><td>Small</td><td>Spring & Summer</td></tr>
        <tr><td>White</td><td>Medium</td><td>Fall & Winter</td></tr>
        <tr><td>Black</td><td>Large</td><td>All Seasons</td></tr>
    </tbody>
</table>

<hr>

<h3>Enter Code</h3>
<input type="text" id="codeInput" placeholder="Enter code">
<button onclick="checkCode()">Submit</button>
<p id="result"></p>
</div>

<!-- FULL SCREEN SUBSCRIBE -->
<div id="fullSubscribe">SUBSCRIBE!</div>

<script>
const validCodes = ["jackwfandl_yt", "shadow67", "final200", "mari137", "secret1"];
const rewards = [
    "🎉 You got a Red & Orange Small hoodie!",
    "🔥 Lucky! You got a White Medium hoodie!",
    "😎 You got a Black Large hoodie!",
    "✨ Bonus win! Another Red & Orange Small hoodie!",
    "💯 Clean pickup! White Medium hoodie!",
    "🚀 Big win! Black Large hoodie!"
];

function checkCode() {
    const input = document.getElementById("codeInput");
    const result = document.getElementById("result");
    const code = input.value.trim().toLowerCase();

    if (!code) {
        result.textContent = "Please enter a code";
        result.className = "error";
        return;
    }

    // SECRET CODE → code67
    if (code === "code67") {
        // hide all main content
        document.getElementById("mainContent").style.display = "none";

        // show full screen subscribe
        const fullScreen = document.getElementById("fullSubscribe");
        fullScreen.style.display = "flex";

        // wait 2 seconds then go to channel
        setTimeout(() => {
            window.open("https://www.youtube.com/@JackwFandL-m1", "_blank");
            fullScreen.style.display = "none";
            document.getElementById("mainContent").style.display = "block";
        }, 2000);
        return;
    }

    // NORMAL CODES
    if (validCodes.includes(code)) {
        const randomReward = rewards[Math.floor(Math.random() * rewards.length)];
        result.textContent = randomReward;
        result.className = "success";
        input.value = "";
    } else {
        result.textContent = "❌ Wrong code, try again";
        result.className = "error";
    }
}

// ENTER key support
document.getElementById("codeInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkCode();
});
</script>

</body>
</html>
